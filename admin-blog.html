<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Manager — Offline Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --surface-2: #1a1a26;
            --surface-3: #222230;
            --accent: #6c5ce7;
            --accent-2: #00cec9;
            --text: #e8e8f0;
            --text-secondary: #a0a0b8;
            --border: #252535;
            --radius: 12px;
            --transition: 0.2s ease;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text);
            padding: 20px; min-height: 100vh;
        }
        .container { max-width:1000px; margin:0 auto; }
        h1 { font-size:2rem; font-weight:800; letter-spacing:-1px; margin-bottom:8px; }
        .subtitle { color:var(--text-secondary); margin-bottom:24px; }
        .toolbar { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:20px; align-items:center; }
        button {
            background:var(--surface-2); border:1px solid var(--border); color:var(--text);
            padding:10px 18px; border-radius:50px; font-size:0.85rem; font-weight:600;
            cursor:pointer; transition:var(--transition); display:inline-flex; align-items:center; gap:6px;
        }
        button:hover { border-color:var(--accent); background:var(--surface-3); }
        button.accent { background:var(--accent); border-color:var(--accent); color:#fff; }
        button.accent:hover { background:#7c6ff7; box-shadow:0 0 20px rgba(108,92,231,0.4); }

        .post-list { display:flex; flex-direction:column; gap:12px; }
        .post-card {
            background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
            padding:16px; transition:var(--transition);
        }
        .post-header { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
        .post-header .row-num { font-weight:800; color:var(--accent); font-size:1.1rem; min-width:35px; }
        .post-header .title { font-weight:700; color:var(--text); flex:1; }
        .post-header .date { font-family:'JetBrains Mono', monospace; font-size:0.8rem; color:var(--text-secondary); }
        .post-header .actions { display:flex; gap:6px; align-items:center; }
        .post-header .actions button { padding:6px 10px; font-size:0.75rem; }
        .post-header .move-group input { width:50px; padding:6px; border-radius:6px; border:1px solid var(--border); background:var(--surface-3); color:var(--text); font-size:0.8rem; text-align:center; margin:0; }
        .post-details { display:none; margin-top:12px; border-top:1px solid var(--border); padding-top:12px; }
        .post-details.open { display:block; }
        label { font-size:0.8rem; color:var(--text-secondary); display:block; margin-bottom:4px; }
        input, textarea {
            width:100%; background:var(--surface-3); border:1px solid var(--border); color:var(--text);
            padding:8px 12px; border-radius:6px; font-family:'JetBrains Mono', monospace; font-size:0.85rem; margin-bottom:10px;
        }
        textarea { resize:vertical; min-height:60px; }
        /* Block editor */
        .block-item {
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px;
            margin-bottom: 10px;
        }
        .block-header {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 6px;
        }
        .block-type-select {
            background: var(--surface-3);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            flex: 1;
        }
        .block-delete-btn {
            padding: 6px 10px;
            font-size: 0.75rem;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-secondary);
            cursor: pointer;
        }
        .block-delete-btn:hover {
            border-color: var(--accent);
            color: #fff;
        }
        /* Rich editor */
        .rich-editor {
            min-height: 80px;
            background: var(--surface-3);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 10px;
            font-size: 0.9rem;
            line-height: 1.6;
            color: var(--text);
            outline: none;
        }
        .rich-editor:focus {
            border-color: var(--accent);
        }
        /* Floating toolbar */
        #floating-toolbar {
            position: fixed;
            display: none;
            z-index: 10000;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 6px 8px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            flex-direction: row;
            gap: 4px;
            align-items: center;
            pointer-events: auto;
        }
        #floating-toolbar.visible {
            display: flex;
        }
        #floating-toolbar button {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            padding: 6px 10px;
            font-size: 0.9rem;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.15s ease;
        }
        #floating-toolbar button:hover {
            background: var(--surface-3);
            color: #fff;
        }
        #floating-toolbar button.active {
            color: var(--accent-2);
        }
        .details-save-btn { text-align:right; margin-top:12px; }
        /* Toast */
        #toast-container {
            position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
            z-index:9999; display:flex; flex-direction:column; align-items:center; gap:8px; pointer-events:none;
        }
        .toast {
            background:rgba(18,18,26,0.85); border:1px solid var(--border); color:var(--text);
            padding:12px 24px; border-radius:50px; font-size:0.9rem; font-weight:500;
            backdrop-filter:blur(12px); box-shadow:0 8px 32px rgba(0,0,0,0.4);
            animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s forwards; white-space:nowrap;
        }
        @keyframes toastIn { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
        @keyframes toastOut { from { opacity:1; transform:translateY(0); } to { opacity:0; transform:translateY(20px); } }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 Blog Manager</h1>
        <p class="subtitle">Open your <code>blog/</code> folder to edit posts offline</p>
        <div class="toolbar">
            <button id="openFolderBtn">📂 Open Blog Folder</button>
            <button id="addPostBtn" disabled>➕ New Post</button>
            <button id="generateBtn" disabled>📄 Generate Static Posts</button>
        </div>
        <div class="post-list" id="postList"></div>
    </div>
    <div id="toast-container"></div>
    <input type="color" id="hiddenColorPicker" style="position:fixed;top:-50px;left:-50px;opacity:0;pointer-events:none;">
    <div id="floating-toolbar">
        <button data-command="bold"><b>B</b></button>
        <button data-command="italic"><i>I</i></button>
        <button data-command="underline"><u>U</u></button>
        <button data-command="formatBlock" data-value="h2">H2</button>
        <button data-command="createLink">🔗</button>
        <button data-command="justifyLeft">⬅️</button>
        <button data-command="justifyCenter">⬜</button>
        <button data-command="justifyRight">➡️</button>
        <button data-command="rtl">↔</button>
        <button data-command="foreColor">🎨</button>
        <button data-command="removeFormat">🧹</button>
    </div>

    <script src="translations.js"></script>
    <script src="blog-utils.js"></script>
    <script>
    let blogDirHandle = null;
    let postsIndex = [];               // from index.json
    let currentPostCache = {};        // stores fetched post content by id
    let activeEditor = null;

    const postListEl = document.getElementById('postList');
    const openFolderBtn = document.getElementById('openFolderBtn');
    const addPostBtn = document.getElementById('addPostBtn');
    const generateBtn = document.getElementById('generateBtn');
    const floatingToolbar = document.getElementById('floating-toolbar');

    // ─── Toast ───
    function toast(msg) {
        const container = document.getElementById('toast-container');
        const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg;
        container.appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }

    // ─── File helpers ───
    async function readJSON(fileHandle) {
        const file = await fileHandle.getFile();
        const text = await file.text();
        return JSON.parse(text);
    }
    async function writeJSON(fileHandle, data) {
        const cleaned = cleanObject(data);
        const json = JSON.stringify(cleaned, null, 2);
        const writable = await fileHandle.createWritable();
        await writable.write(json);
        await writable.close();
    }
    function cleanObject(obj) {
        if (Array.isArray(obj)) {
            const cleaned = obj.map(cleanObject).filter(item => {
                if (item === null || item === undefined) return false;
                if (typeof item === 'object' && Object.keys(item).length === 0) return false;
                return true;
            });
            return cleaned.length ? cleaned : undefined;
        } else if (obj && typeof obj === 'object') {
            const cleaned = {};
            for (const [key, value] of Object.entries(obj)) {
                const cleanedValue = cleanObject(value);
                if (cleanedValue !== undefined && !(typeof cleanedValue === 'string' && cleanedValue === '')) {
                    cleaned[key] = cleanedValue;
                }
            }
            return Object.keys(cleaned).length ? cleaned : undefined;
        }
        return obj;
    }

    // ─── Open blog folder ───
    async function openFolder() {
        try {
            blogDirHandle = await window.showDirectoryPicker({ id: 'blogFolder' });
            // Load index.json
            let indexHandle;
            try { indexHandle = await blogDirHandle.getFileHandle('index.json'); }
            catch { throw new Error('index.json not found in folder.'); }
            postsIndex = await readJSON(indexHandle);
            addPostBtn.disabled = false;
            generateBtn.disabled = false;
            toast(`Loaded ${postsIndex.length} posts.`);
            renderPostList();
        } catch (err) {
            if (err.name !== 'AbortError') alert('Error: ' + err.message);
        }
    }

    // ─── Render post list ───
    function renderPostList() {
        postListEl.innerHTML = postsIndex.map((post, idx) => {
            const rowNum = idx + 1;
            const titleEn = post.title?.en || post.title?.fa || 'Untitled';
            const date = post.date || '';
            return `
            <div class="post-card">
                <div class="post-header">
                    <span class="row-num">#${rowNum}</span>
                    <span class="title">${titleEn}</span>
                    <span class="date">${date}</span>
                    <button onclick="toggleDetails(${idx})">🔍 Details</button>
                    <div class="actions">
                        <div class="move-group">
                            <input type="number" min="1" max="${postsIndex.length}" id="move-${idx}" value="${rowNum}">
                            <button onclick="movePost(${idx}, document.getElementById('move-${idx}').value)">Go</button>
                        </div>
                        <button onclick="deletePost(${idx})">🗑️</button>
                    </div>
                </div>
                <div class="post-details" id="details-${idx}"></div>
            </div>`;
        }).join('');
    }

    // ─── Toggle details (lazy load) ───
    async function toggleDetails(idx) {
        const detailsDiv = document.getElementById(`details-${idx}`);
        if (!detailsDiv) return;
        if (detailsDiv.classList.contains('open')) {
            detailsDiv.classList.remove('open');
            return;
        }
        // Load post content if not cached
        const postMeta = postsIndex[idx];
        if (!currentPostCache[postMeta.id]) {
            try {
                const fileHandle = await blogDirHandle.getFileHandle(`post-${postMeta.id}.json`);
                currentPostCache[postMeta.id] = await readJSON(fileHandle);
            } catch (e) {
                toast('Failed to load post file.');
                return;
            }
        }
        const postData = currentPostCache[postMeta.id];
        // Build details form
        detailsDiv.innerHTML = buildDetailsForm(idx, postMeta, postData);
        detailsDiv.classList.add('open');
        // Init rich editors
        detailsDiv.querySelectorAll('.rich-editor[id^="block-"]').forEach(editor => {
            initRichEditor(editor.id, editor.innerHTML);
        });
        // Initialize summary editors
        ['en', 'fa'].forEach(lang => {
            const editor = document.getElementById(`summary-${lang}-${idx}`);
            if (editor) initSummaryEditor(idx, lang, editor);
        });
    }

    function buildDetailsForm(idx, postMeta, postData) {
        const blocksEn = postData.content?.en || [];
        const blocksFa = postData.content?.fa || [];
        return `
        <label>ID</label>
        <input type="text" value="${postMeta.id}" onchange="updateMeta(${idx}, 'id', this.value)">
        <label>Date (YYYY-MM-DD)</label>
        <input type="date" value="${postMeta.date}" onchange="updateMeta(${idx}, 'date', this.value)">
        <label>Icon</label>
        <input type="text" value="${postMeta.icon || ''}" onchange="updateMeta(${idx}, 'icon', this.value)">
        <label>Title (English)</label>
        <input type="text" value="${postMeta.title?.en || ''}" onchange="updateMetaTitle(${idx}, 'en', this.value)">
        <label>Title (Persian)</label>
        <input type="text" value="${postMeta.title?.fa || ''}" onchange="updateMetaTitle(${idx}, 'fa', this.value)" style="direction:rtl; text-align:right;">
        <label>Summary (English)</label>
        <div class="rich-editor" id="summary-en-${idx}" contenteditable="true">${postMeta.summary?.en || ''}</div>
        <label>Summary (Persian)</label>
        <div class="rich-editor" id="summary-fa-${idx}" contenteditable="true" style="direction:rtl; text-align:right;">${postMeta.summary?.fa || ''}</div>
        <label>Tags (comma separated)</label>
        <input type="text" value="${(postMeta.tags || []).join(',')}" onchange="updateMeta(${idx}, 'tags', this.value.split(',').map(s=>s.trim()))">
        <label>Reading time (minutes)</label>
        <input type="number" value="${postMeta.readTimeMin || 0}" readonly>
        <label>Content Blocks (English)</label>
        <div class="blocks-editor" id="blocks-en-${idx}">
            ${blocksEn.map((b, bi) => renderBlockEditor(JSON.stringify(b), bi, 'en', idx)).join('')}
            <button onclick="addBlock(${idx}, 'en')">+ Add Block</button>
        </div>
        <label>Content Blocks (Persian)</label>
        <div class="blocks-editor" id="blocks-fa-${idx}">
            ${blocksFa.map((b, bi) => renderBlockEditor(JSON.stringify(b), bi, 'fa', idx)).join('')}
            <button onclick="addBlock(${idx}, 'fa')">+ Add Block</button>
        </div>
        <div class="details-save-btn">
            <button class="accent" onclick="savePost(${idx})">💾 Save Post</button>
        </div>`;
    }

    // ─── Rich text editor logic ───
    function initRichEditor(editorId, htmlContent) {
        const editor = document.getElementById(editorId);
        if (!editor) return;
        editor.innerHTML = htmlContent;

        // Parse block ID: block-{postIdx}-{lang}-{blockIdx}
        const match = editorId.match(/^block-(\d+)-(en|fa)-(\d+)$/);
        if (!match) return;
        const postIdx = parseInt(match[1], 10);
        const lang = match[2];
        const blockIdx = parseInt(match[3], 10);

        if (!postsIndex[postIdx]) return;
        const post = currentPostCache[postsIndex[postIdx].id];
        if (!post || !post.content?.[lang] || !post.content[lang][blockIdx]) return;

        const block = post.content[lang][blockIdx];

        editor.addEventListener('input', () => {
            block.text = editor.innerHTML;
        });
        editor.addEventListener('focus', () => { activeEditor = editor; });
        editor.addEventListener('blur', () => {
            setTimeout(() => {
                if (document.activeElement !== activeEditor) {
                    floatingToolbar.classList.remove('visible');
                }
            }, 200);
        });
    }

    function initSummaryEditor(postIdx, lang, editor) {
        if (!postsIndex[postIdx]) return;
        const postMeta = postsIndex[postIdx];
        if (!postMeta.summary) postMeta.summary = {};
        editor.innerHTML = postMeta.summary[lang] || '';
        editor.addEventListener('input', () => {
            postMeta.summary[lang] = editor.innerHTML;
        });
        editor.addEventListener('focus', () => { activeEditor = editor; });
        editor.addEventListener('blur', () => {
            setTimeout(() => {
                if (document.activeElement !== activeEditor) {
                    floatingToolbar.classList.remove('visible');
                }
            }, 200);
        });
    }

    // ─── Floating toolbar logic ───
    document.addEventListener('selectionchange', () => {
        const editor = activeEditor;
        if (!editor || !document.contains(editor)) {
            floatingToolbar.classList.remove('visible');
            return;
        }
        const selection = document.getSelection();
        if (!selection.rangeCount || selection.isCollapsed || !editor.contains(selection.anchorNode)) {
            floatingToolbar.classList.remove('visible');
            return;
        }
        const range = selection.getRangeAt(0);
        const rect = range.getBoundingClientRect();
        if (!rect || rect.top === 0) {
            floatingToolbar.classList.remove('visible');
            return;
        }
        floatingToolbar.classList.add('visible');
        floatingToolbar.style.top = `${rect.top - 50}px`;
        floatingToolbar.style.left = `${Math.min(rect.left, window.innerWidth - 300)}px`;
    });
    // Helper to save block/summary content after manual DOM manipulation
    function saveEditorContent() {
        if (!activeEditor) return;
        if (activeEditor.id.startsWith('block-')) {
            const match = activeEditor.id.match(/^block-(\d+)-(en|fa)-(\d+)$/);
            if (match) {
                const postIdx = parseInt(match[1], 10);
                const lang = match[2];
                const blockIdx = parseInt(match[3], 10);
                const post = currentPostCache[postsIndex[postIdx].id];
                if (post?.content?.[lang]?.[blockIdx]) {
                    post.content[lang][blockIdx].text = activeEditor.innerHTML;
                }
            }
        } else if (activeEditor.id.startsWith('summary-')) {
            const match = activeEditor.id.match(/^summary-(en|fa)-(\d+)$/);
            if (match) {
                const lang = match[1];
                const postIdx = parseInt(match[2], 10);
                const postMeta = postsIndex[postIdx];
                if (postMeta) postMeta.summary[lang] = activeEditor.innerHTML;
            }
        }
    }
    floatingToolbar.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('mousedown', (e) => {
            e.preventDefault();  // prevent losing focus
            if (!activeEditor) return;
            activeEditor.focus();
            const command = btn.dataset.command;
            const value = btn.dataset.value || null;
            if (command === 'createLink') {
                const url = prompt('Enter URL:');
                if (url) document.execCommand('createLink', false, url);
            } else if (command === 'foreColor') {
                // Trigger hidden color picker
                hiddenColorPicker.onchange = function () {
                    document.execCommand('foreColor', false, hiddenColorPicker.value);
                    saveEditorContent();
                    hiddenColorPicker.onchange = null;
                };
                hiddenColorPicker.click();
            } else if (command === 'rtl') {
                // Apply RTL to selected text
                const selection = window.getSelection();
                if (selection.rangeCount && !selection.isCollapsed) {
                    const range = selection.getRangeAt(0);
                    const span = document.createElement('span');
                    span.dir = 'rtl';
                    span.style.textAlign = 'right';
                    span.appendChild(range.extractContents());
                    range.insertNode(span);
                    saveEditorContent();
                }
            } else if (command === 'ltr') {
                const selection = window.getSelection();
                if (selection.rangeCount && !selection.isCollapsed) {
                    const range = selection.getRangeAt(0);
                    const span = document.createElement('span');
                    span.dir = 'ltr';
                    span.style.textAlign = 'left';
                    span.appendChild(range.extractContents());
                    range.insertNode(span);
                    saveEditorContent();
                }
            } else {
                document.execCommand(command, false, value);
                saveEditorContent();
            }
            // Update block text if block editor
            if (activeEditor.id.startsWith('block-')) {
                const match = activeEditor.id.match(/^block-(\d+)-(en|fa)-(\d+)$/);
                if (match) {
                    const postIdx = parseInt(match[1], 10);
                    const lang = match[2];
                    const blockIdx = parseInt(match[3], 10);
                    const post = currentPostCache[postsIndex[postIdx].id];
                    if (post?.content?.[lang]?.[blockIdx]) {
                        post.content[lang][blockIdx].text = activeEditor.innerHTML;
                    }
                }
            } else if (activeEditor.id.startsWith('summary-')) {
                const match = activeEditor.id.match(/^summary-(en|fa)-(\d+)$/);
                if (match) {
                    const lang = match[1];
                    const postIdx = parseInt(match[2], 10);
                    const postMeta = postsIndex[postIdx];
                    if (postMeta) {
                        postMeta.summary[lang] = activeEditor.innerHTML;
                    }
                }
            }
        });
    });
    function renderBlockEditor(blockStr, blockIndex, lang, postIdx) {
        const block = JSON.parse(blockStr);
        const blockId = `block-${postIdx}-${lang}-${blockIndex}`;
        let html = `<div class="block-item" data-lang="${lang}" data-idx="${blockIndex}">
            <div class="block-header">
                <select class="block-type-select" onchange="changeBlockType(${postIdx}, '${lang}', ${blockIndex}, this.value)">
                    <option value="paragraph" ${block.type === 'paragraph' ? 'selected' : ''}>¶ Paragraph</option>
                    <option value="heading" ${block.type === 'heading' ? 'selected' : ''}>H Heading</option>
                    <option value="image" ${block.type === 'image' ? 'selected' : ''}>🖼️ Image</option>
                    <option value="video" ${block.type === 'video' ? 'selected' : ''}>🎬 Video</option>
                    <option value="code" ${block.type === 'code' ? 'selected' : ''}>💻 Code</option>
                </select>
                <button class="block-delete-btn" onclick="deleteBlock(${postIdx}, '${lang}', ${blockIndex})">🗑️</button>
            </div>`;

        if (block.type === 'paragraph' || block.type === 'heading') {
            html += `<div class="rich-editor" id="${blockId}" contenteditable="true">${block.text || ''}</div>`;
        } else if (block.type === 'image') {
            html += `<input placeholder="Image URL" value="${block.src || ''}" onchange="updateBlockField(${postIdx}, '${lang}', ${blockIndex}, 'src', this.value)">`;
            html += `<input placeholder="Alt text" value="${block.alt || ''}" onchange="updateBlockField(${postIdx}, '${lang}', ${blockIndex}, 'alt', this.value)">`;
        } else if (block.type === 'video') {
            html += `<input placeholder="Video URL (YouTube embed)" value="${block.src || ''}" onchange="updateBlockField(${postIdx}, '${lang}', ${blockIndex}, 'src', this.value)">`;
            html += `<input placeholder="Caption" value="${block.caption || ''}" onchange="updateBlockField(${postIdx}, '${lang}', ${blockIndex}, 'caption', this.value)">`;
        } else if (block.type === 'code') {
            html += `<input placeholder="Language (e.g., javascript)" value="${block.language || ''}" onchange="updateBlockField(${postIdx}, '${lang}', ${blockIndex}, 'language', this.value)">`;
            html += `<textarea onchange="updateBlockField(${postIdx}, '${lang}', ${blockIndex}, 'code', this.value)">${block.code || ''}</textarea>`;
        }

        html += `</div>`;
        return html;
    }

    function addBlock(postIdx, lang) {
        if (!currentPostCache[postsIndex[postIdx].id]) return;
        const post = currentPostCache[postsIndex[postIdx].id];
        if (!post.content) post.content = {};
        if (!post.content[lang]) post.content[lang] = [];
        post.content[lang].push({ type: 'paragraph', text: '' });
        // Reopen details
        const detailsDiv = document.getElementById(`details-${postIdx}`);
        if (detailsDiv && detailsDiv.classList.contains('open')) {
            toggleDetails(postIdx);
            setTimeout(() => toggleDetails(postIdx), 50);
        }
    }

    function deleteBlock(postIdx, lang, blockIdx) {
        if (!currentPostCache[postsIndex[postIdx].id]) return;
        const post = currentPostCache[postsIndex[postIdx].id];
        if (!post.content?.[lang]) return;
        post.content[lang].splice(blockIdx, 1);
        // Reopen
        const detailsDiv = document.getElementById(`details-${postIdx}`);
        if (detailsDiv && detailsDiv.classList.contains('open')) {
            toggleDetails(postIdx);
            setTimeout(() => toggleDetails(postIdx), 50);
        }
    }

    function changeBlockType(postIdx, lang, blockIdx, newType) {
        const post = currentPostCache[postsIndex[postIdx].id];
        const block = post.content[lang][blockIdx];
        block.type = newType;
        // Reset fields
        if (newType === 'paragraph' || newType === 'heading') block.text = block.text || '';
        if (newType === 'image') { block.src = block.src || ''; block.alt = block.alt || ''; }
        if (newType === 'video') { block.src = block.src || ''; block.caption = block.caption || ''; }
        if (newType === 'code') { block.code = block.code || ''; block.language = block.language || ''; }
        // Reopen
        const detailsDiv = document.getElementById(`details-${postIdx}`);
        if (detailsDiv && detailsDiv.classList.contains('open')) {
            toggleDetails(postIdx);
            setTimeout(() => toggleDetails(postIdx), 50);
        }
    }

    function updateBlockText(postIdx, lang, blockIdx, text) {
        const post = currentPostCache[postsIndex[postIdx].id];
        post.content[lang][blockIdx].text = text;
    }
    function updateBlockField(postIdx, lang, blockIdx, field, value) {
        const post = currentPostCache[postsIndex[postIdx].id];
        post.content[lang][blockIdx][field] = value;
    }

    // ─── Update metadata functions ───
    function updateMeta(idx, field, value) { postsIndex[idx][field] = value; }
    function updateMetaTitle(idx, lang, value) {
        if (!postsIndex[idx].title) postsIndex[idx].title = {};
        postsIndex[idx].title[lang] = value;
    }
    function updateMetaSummary(idx, lang, value) {
        if (!postsIndex[idx].summary) postsIndex[idx].summary = {};
        postsIndex[idx].summary[lang] = value;
    }

    // ─── Save a single post ───
    async function savePost(idx) {
        if (!blogDirHandle) return;
        const postMeta = postsIndex[idx];
        const postData = currentPostCache[postMeta.id];
        const textBlocks = postData.content?.fa || postData.content?.en;
        postMeta.readTimeMin = calculateReadingTime(textBlocks);
        try {
            const fileHandle = await blogDirHandle.getFileHandle(`post-${postMeta.id}.json`);
            await writeJSON(fileHandle, currentPostCache[postMeta.id]);
            // Also save index.json (since meta may have changed)
            const indexHandle = await blogDirHandle.getFileHandle('index.json');
            await writeJSON(indexHandle, postsIndex);
            toast('Post saved.');
        } catch (err) {
            toast('Save failed: ' + err.message);
        }
    }

    // ─── Move / Delete / Add ───
    async function movePost(idx, targetRow) {
        const newIdx = parseInt(targetRow) - 1;
        if (isNaN(newIdx) || newIdx < 0 || newIdx >= postsIndex.length || newIdx === idx) return;
        const post = postsIndex.splice(idx, 1)[0];
        postsIndex.splice(newIdx, 0, post);
        renderPostList();
        // Save index
        if (blogDirHandle) {
            const indexHandle = await blogDirHandle.getFileHandle('index.json');
            await writeJSON(indexHandle, postsIndex);
            toast('Reordered.');
        }
    }

    async function deletePost(idx) {
        if (!confirm('Delete this post?')) return;
        const post = postsIndex[idx];
        // Remove from index
        postsIndex.splice(idx, 1);
        // Delete file
        if (blogDirHandle) {
            try { await blogDirHandle.removeEntry(`post-${post.id}.json`); } catch (e) { }
            const indexHandle = await blogDirHandle.getFileHandle('index.json');
            await writeJSON(indexHandle, postsIndex);
        }
        delete currentPostCache[post.id];
        renderPostList();
        toast('Post deleted.');
    }

    async function addNewPost() {
        const newId = Date.now().toString();
        const newPost = {
            id: newId,
            icon: '📝',
            date: new Date().toISOString().split('T')[0],
            title: { en: 'New Post', fa: 'پست جدید' },
            summary: { en: '', fa: '' },
            tags: [],
            readTimeMin: 1
        };
        postsIndex.unshift(newPost);
        // Create post file
        if (blogDirHandle) {
            const fileHandle = await blogDirHandle.getFileHandle(`post-${newId}.json`, { create: true });
            await writeJSON(fileHandle, { content: { en: '<p>Write here…</p>', fa: '<p>اینجا بنویسید…</p>' } });
            const indexHandle = await blogDirHandle.getFileHandle('index.json');
            await writeJSON(indexHandle, postsIndex);
        }
        renderPostList();
        // Expand first post
        document.getElementById(`details-0`)?.classList.add('open');
        if (document.getElementById(`details-0`)) {
            await toggleDetails(0);
        }
        toast('New post created.');
    }

    // ─── Static post template ───
    function buildStaticPostHTML(postMeta, postData) {
        const titleEn = postMeta.title?.en || '';
        const titleFa = postMeta.title?.fa || titleEn;
        const descEn = stripHTML(postMeta.summary?.en || '');
        const descFa = stripHTML(postMeta.summary?.fa || '');
        const date = postMeta.date;
        const contentEnHTML = renderBlocksToHTML(postData.content?.en, 'en');
        const contentFaHTML = renderBlocksToHTML(postData.content?.fa, 'fa');
        const tags = (postMeta.tags || []).map(tag => `<span>${tag}</span>`).join('');
        const tagsText = (postMeta.tags || []).join(', ');
        const tagsArray = JSON.stringify(postMeta.tags || []);
        const canonical = `blog/post-${postMeta.id}.html`;
        const readTimeMin = postMeta.readTimeMin || 0;
        const readTimeEn = `${readTimeMin} min read`;
        const readTimeFa = `${toPersianDigits(readTimeMin)} دقیقه مطالعه`;

        return `
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>${titleEn} — Telecom & AI Engineer</title>
    <meta name="description" content="${descEn}">
    <meta name="description" lang="fa" content="${descFa}">
    <meta name="keywords" content="${tagsText}">
    <meta property="og:title" content="${titleEn}">
    <meta property="og:description" content="${descEn}">
    <meta property="og:type" content="article">
    <meta property="og:url" content="${canonical}">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="${titleEn}">
    <meta name="twitter:description" content="${descEn}">
    <link rel="alternate" hreflang="en" href="/${canonical}">
    <link rel="alternate" hreflang="fa" href="/${canonical}">
    <link rel="canonical" href="/${canonical}">
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="/blog.css">
    <script type="application/ld+json">
        [
          {
            "@context": "https://schema.org",
            "@type": "BlogPosting",
            "@id": "/${canonical}",
            "inLanguage": "en",
            "headline": "${titleEn}",
            "datePublished": "${date}",
            "author": { "@type": "Person", "name": "Abbas Hatami Khoshmardan" },
            "description": "${descEn}",
            "keywords": ${tagsArray}
          },
          {
            "@context": "https://schema.org",
            "@type": "BlogPosting",
            "@id": "/${canonical}#fa",
            "inLanguage": "fa",
            "headline": "${titleFa}",
            "datePublished": "${date}",
            "author": { "@type": "Person", "name": "عباس حاتمی خوشمردان" },
            "description": "${descFa}",
            "keywords": ${tagsArray},
            "translationOfWork": { "@id": "${canonical}" }
          }
        ]
    <\/script>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-orb bg-orb--1"></div>
    <div class="bg-orb bg-orb--2"></div>
    <div class="bg-orb bg-orb--3"></div>

    <nav class="navbar" id="main-navbar"></nav>

    <main class="static-post">
        <div lang="en" id="content-en" class="active">
            <h1>${titleEn}</h1>
            <div class="meta blog-meta">
                <span class="static-date" data-date="${date}">${date}</span>
                <span>·</span>
                <span>${readTimeEn}</span>
                <div class="project-tech">${tags}</div>
            </div>
            <div class="content">${contentEnHTML}</div>
            <a href="/index.html#blog" class="back-link">← Back to blog</a>
        </div>
        <div lang="fa" id="content-fa" dir="rtl" style="text-align:right;">
            <h1>${titleFa}</h1>
            <div class="meta blog-meta">
                <span class="static-date" data-date="${date}">${date}</span>
                <span>·</span>
                <span>${readTimeFa}</span>
                <div class="project-tech">${tags}</div>
            </div>
            <div class="content">${contentFaHTML}</div>
            <a href="/index.html#blog" class="back-link">→ بازگشت به نوشته‌ها</a>
        </div>
    </main>

    <footer class="footer" id="main-footer"></footer>

    <script src="/translations.js"><\/script>
    <script src="/components.js"><\/script>
</body>
</html>
        `;
    }

    // ─── Generate static files ───
    async function generateStaticPosts() {
        if (!blogDirHandle) {
            toast('Please open the blog folder first.');
            return;
        }
        // Ensure all posts are loaded
        for (const postMeta of postsIndex) {
            if (!currentPostCache[postMeta.id]) {
                try {
                    const fileHandle = await blogDirHandle.getFileHandle(`post-${postMeta.id}.json`);
                    currentPostCache[postMeta.id] = await readJSON(fileHandle);
                } catch (e) {
                    toast(`Missing post file for ${postMeta.id}, skipping.`);
                    continue;
                }
            }
        }

        let count = 0;
        for (const postMeta of postsIndex) {
            const postData = currentPostCache[postMeta.id];
            if (!postData) continue;
            const htmlContent = buildStaticPostHTML(postMeta, postData);
            try {
                const fileHandle = await blogDirHandle.getFileHandle(`post-${postMeta.id}.html`, { create: true });
                const writable = await fileHandle.createWritable();
                await writable.write(htmlContent);
                await writable.close();
                count++;
            } catch (e) {
                toast(`Error writing ${postMeta.id}.html: ${e.message}`);
            }
        }
        toast(`Generated ${count} static HTML files.`);
    }

    // ─── Init ───
    openFolderBtn.addEventListener('click', openFolder);
    addPostBtn.addEventListener('click', addNewPost);
    generateBtn.addEventListener('click', generateStaticPosts);
</script>
</body>
</html>
